<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heaven501 Hub</title>
    <style>
        :root {
            --bg-main: #070b14;
            --bg-gradient: radial-gradient(circle at top, #111827 0%, var(--bg-main) 100%);
            --card-bg: rgba(15, 23, 42, 0.6);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --tag-bg: rgba(56, 189, 248, 0.2);
            --code-bg: #0f172a;
            --highlight-501: rgba(255, 215, 0, 0.15);
            --highlight-border: #ffd700;
        }

        body.theme-light {
            --bg-main: #f0f4f8;
            --bg-gradient: radial-gradient(circle at top, #ffffff 0%, var(--bg-main) 100%);
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #0f172a;
            --text-muted: #475569;
            --accent-blue: #0284c7;
            --tag-bg: rgba(2, 132, 199, 0.1);
            --code-bg: #e2e8f0;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: 0.5s;
        }

        /* --- Header & Horizontal Nav --- */
        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: inherit;
        }

        .brand {
            display: flex;
            align-items: center;
            margin-right: 30px;
            flex-shrink: 0;
        }
        .brand img { width: 35px; height: 35px; border-radius: 6px; margin-right: 10px; }
        .brand h1 { font-size: 1.5rem; margin: 0; }
        .brand .blue { color: var(--accent-blue); }
        .brand .white { color: var(--text-main); }

        nav {
            flex: 1;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }
        nav::-webkit-scrollbar { display: none; }

        .nav-list {
            display: flex;
            list-style: none;
            gap: 15px;
            padding: 0;
            margin: 0;
        }
        .nav-list li {
            padding: 8px 16px;
            cursor: pointer;
            font-weight: 700;
            color: var(--text-muted);
            border-radius: 30px;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .nav-list li.active { background: var(--tag-bg); color: var(--accent-blue); }

        /* --- Grid & Cards --- */
        #content-area { width: 100%; max-width: 1100px; padding: 40px 20px; box-sizing: border-box; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .section-title {
            width: 100%;
            opacity: 0.6;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 40px 0 20px 0;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-5px); }

        .card-img { width: 60px; height: 60px; border-radius: 12px; margin-right: 15px; object-fit: cover; border: 2px solid transparent; }
        .card-info { flex: 1; }
        .card-name { font-size: 1rem; margin: 0; }
        .card-desc { font-size: 0.8rem; opacity: 0.6; margin: 5px 0; }

        /* Blackout Overlay */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        .card.active-state .overlay { opacity: 1; pointer-events: all; }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .btn-view { background: var(--accent-blue); color: #000; }
        .btn-cancel { background: #334155; color: #fff; }

        /* Badge & Status */
        .badge { position: absolute; top: 10px; right: 10px; background: var(--tag-bg); color: var(--accent-blue); padding: 3px 10px; border-radius: 10px; font-size: 0.65rem; font-weight: bold; }
        .status-row { display: flex; align-items: center; gap: 8px; font-size: 0.65rem; font-weight: bold; margin-top: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-active { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        .status-construction { background: #ffd700; box-shadow: 0 0 10px #ffd700; }

        /* --- FAQ Accordion --- */
        .faq-item { background: var(--card-bg); margin-bottom: 10px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .faq-q { padding: 20px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; color: var(--accent-blue); }
        .faq-q::after { content: '+'; }
        .faq-item.open .faq-q::after { content: '−'; }
        .faq-a { max-height: 0; opacity: 0; padding: 0 20px; transition: 0.3s ease-out; overflow: hidden; font-size: 0.9rem; color: var(--text-muted); }
        .faq-item.open .faq-a { max-height: 200px; opacity: 1; padding-bottom: 20px; }

        /* --- Dev Section --- */
        .code-block-wrapper { background: var(--code-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; position: relative; }
        .tag-501 { background: var(--highlight-501); border: 1px dashed var(--highlight-border); color: var(--highlight-border); padding: 2px 5px; border-radius: 4px; }
        .copy-btn { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); color: #fff; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.7rem; }

        /* --- Floating UI --- */
        .floating-controls { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .scroll-ring-container { 
            width: 45px; height: 45px; background: var(--card-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; border: 1px solid rgba(255,255,255,0.1); opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .scroll-ring-container.visible { opacity: 1; pointer-events: all; }
        .theme-toggles { background: var(--card-bg); padding: 10px; border-radius: 30px; display: flex; gap: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .theme-btn { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; }
        .dark { background: #070b14; border: 1px solid #fff; }
        .light { background: #f8fafc; border: 1px solid #000; }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <img src="https://placehold.co/100/38bdf8/ffffff?text=H" alt="Logo">
            <h1><span class="blue">Heaven</span><span class="white">501</span></h1>
        </div>
        <nav>
            <ul class="nav-list">
                <li onclick="loadTab('faqs')" id="nav-faqs">FAQs</li>
                <li onclick="loadTab('projects')" id="nav-projects">Projects</li>
                <li onclick="loadTab('connect')" id="nav-connect">Connect</li>
                <li onclick="loadTab('dev')" id="nav-dev">Dev</li>
            </ul>
        </nav>
    </header>

    <main id="content-area"></main>

    <div class="floating-controls">
        <div class="scroll-ring-container" id="scroll-top-btn" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</div>
        <div class="theme-toggles">
            <div class="theme-btn dark" onclick="setTheme('dark')"></div>
            <div class="theme-btn light" onclick="setTheme('light')"></div>
        </div>
    </div>

    <script>
        const contentArea = document.getElementById('content-area');

        // --- LOCAL BACKUP DATA (In case fetch fails) ---
        const localDB = {
            faqs: [
                { q: "How to use this?", a: "Click the tabs above to navigate different sections of the community." },
                { q: "What is Dev mode?", a: "It's for coders to copy bot snippets for Heaven501 integration." }
            ],
            connect: {
                community: [{ name: "Main Portal", desc: "Access the hub.", img: "https://placehold.co/80", color: "#38bdf8", status: "active", tag: "Recommended", link: "#" }],
                admins: [{ name: "Owner 501", desc: "Primary Admin", img: "https://placehold.co/80", color: "#ffd700", status: "active", tag: "Admin", link: "#" }]
            },
            projects: [
                { name: "Heaven Bot", desc: "The official community bot.", img: "https://placehold.co/80", color: "#38bdf8", status: "active", tag: "Beta", link: "#" }
            ],
            dev: [
                { title: "Bot Token Setup", code: "const bot = new Heaven501('<501>YOUR_TOKEN_HERE</501>');\nbot.start();" }
            ]
        };

        async function loadTab(tabName) {
            document.querySelectorAll('.nav-list li').forEach(li => li.classList.remove('active'));
            document.getElementById(`nav-${tabName}`).classList.add('active');
            contentArea.innerHTML = '<p style="text-align:center; opacity:0.5;">Syncing HeavenLink...</p>';

            try {
                const response = await fetch(`${tabName}.json`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                renderSwitch(tabName, data);
            } catch {
                console.warn(`Using local backup for ${tabName}`);
                renderSwitch(tabName, localDB[tabName]);
            }
        }

        function renderSwitch(tabName, data) {
            if (tabName === 'faqs') renderFAQs(data);
            else if (tabName === 'dev') renderDev(data);
            else if (tabName === 'connect') renderConnect(data);
            else renderProjects(data);
        }

        function renderFAQs(data) {
            contentArea.innerHTML = data.map((item, i) => `
                <div class="faq-item" onclick="this.classList.toggle('open')">
                    <div class="faq-q">${item.q}</div>
                    <div class="faq-a">${item.a}</div>
                </div>
            `).join('');
        }

        function renderConnect(data) {
            let html = '<div class="section-title">Community Portal</div>';
            html += `<div class="grid-container">${generateCards(data.community)}</div>`;
            html += '<div class="section-title">Admin Personals</div>';
            html += `<div class="grid-container">${generateCards(data.admins)}</div>`;
            contentArea.innerHTML = html;
        }

        function renderProjects(data) {
            contentArea.innerHTML = `<div class="grid-container">${generateCards(data)}</div>`;
        }

        function generateCards(items) {
            return items.map(item => {
                const id = 'c' + Math.random().toString(36).substr(2, 4);
                return `
                <div class="card" id="${id}" onclick="openCard('${id}')">
                    ${item.tag ? `<div class="badge">${item.tag}</div>` : ''}
                    <img src="${item.img}" class="card-img" style="border-color:${item.color}">
                    <div class="card-info">
                        <h4 class="card-name" style="color:${item.color}">${item.name}</h4>
                        <p class="card-desc">${item.desc}</p>
                        <div class="status-row">
                            <div class="dot status-${item.status}"></div>
                            <span>${item.status}</span>
                        </div>
                    </div>
                    <div class="overlay">
                        <button class="btn btn-view" onclick="window.open('${item.link}')">VIEW</button>
                        <button class="btn btn-cancel" onclick="closeCard('${id}', event)">CANCEL</button>
                    </div>
                </div>`;
            }).join('');
        }

        function renderDev(data) {
            contentArea.innerHTML = data.map(item => {
                const formatted = item.code.replace(/</g, "&lt;").replace(/>/g, "&gt;")
                                           .replace(/&lt;501&gt;(.*?)&lt;\/501&gt;/g, '<span class="tag-501">$1</span>');
                return `
                <div class="code-block-wrapper">
                    <button class="copy-btn" onclick="copyCode(this, \`${item.code}\`)">Copy</button>
                    <h4 style="margin-top:0; color:var(--accent-blue)">${item.title}</h4>
                    <pre><code>${formatted}</code></pre>
                </div>`;
            }).join('');
        }

        function openCard(id) { document.getElementById(id).classList.add('active-state'); }
        function closeCard(id, e) { e.stopPropagation(); document.getElementById(id).classList.remove('active-state'); }

        function copyCode(btn, text) {
            const clean = text.replace(/<501>/g, '').replace(/<\/501>/g, '');
            navigator.clipboard.writeText(clean);
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = "Copy", 2000);
        }

        function setTheme(t) { t === 'light' ? document.body.classList.add('theme-light') : document.body.classList.remove('theme-light'); }

        window.onscroll = () => {
            const btn = document.getElementById('scroll-top-btn');
            window.scrollY > 200 ? btn.classList.add('visible') : btn.classList.remove('visible');
        };

        // Initialize
        loadTab('faqs');
    </script>
</body>
</html>
