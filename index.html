<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heaven501 Hub</title>
    <style>
        :root {
            --bg-dark: #070b14;
            --card-bg: rgba(15, 23, 42, 0.6);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --tag-bg: rgba(56, 189, 248, 0.2);
            --code-bg: #0f172a;
            --highlight-501: rgba(255, 215, 0, 0.15);
            --highlight-border: #ffd700;
        }

        body {
            background: radial-gradient(circle at top, #111827 0%, var(--bg-dark) 100%);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- Mobile Responsive Header --- */
        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column; /* Stack on mobile */
            align-items: center;
            padding: 15px;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(7, 11, 20, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        @media (min-width: 768px) {
            header { flex-direction: row; padding: 20px; }
        }

        .brand { display: flex; align-items: center; }
        .brand img { width: 35px; height: 35px; border-radius: 8px; margin-right: 10px; }
        .brand h1 { font-size: 1.4rem; margin: 0; }

        nav { width: 100%; overflow-x: auto; scrollbar-width: none; }
        nav::-webkit-scrollbar { display: none; }

        .nav-list {
            display: flex;
            list-style: none;
            gap: 10px;
            padding: 0;
            margin: 0;
            justify-content: center;
        }

        /* --- Dev Section: New Layout --- */
        .dev-container { display: flex; flex-direction: column; gap: 30px; }

        .code-snippet-card {
            background: var(--code-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dev-header {
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .dev-header img { width: 40px; height: 40px; border-radius: 10px; margin-right: 12px; object-fit: cover; }
        .dev-header h3 { margin: 0; font-size: 1rem; color: var(--accent-blue); }

        pre { 
            margin: 0; 
            padding: 20px; 
            overflow-x: auto; 
            font-family: 'Courier New', monospace; 
            font-size: 0.85rem; 
            line-height: 1.6; 
            color: #e2e8f0;
        }

        .copy-footer {
            padding: 12px;
            display: flex;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .big-copy-btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: var(--accent-blue);
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
        }

        /* --- Grid & Cards Responsive --- */
        #content-area { width: 100%; max-width: 1100px; padding: 20px; }
        
        .grid-container {
            display: grid;
            grid-template-columns: 1fr; /* 1 column on mobile */
            gap: 15px;
        }

        @media (min-width: 768px) {
            .grid-container { grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); }
        }

        /* Rest of your Card & FAQ styles remain the same... */
        /* (Shortened for brevity but keep your existing Card/FAQ/Status styles here) */
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <img src="https://placehold.co/100/38bdf8/000?text=H" alt="Logo">
            <h1><span style="color:var(--accent-blue)">Heaven</span>501</h1>
        </div>
        <nav>
            <ul class="nav-list">
                <li onclick="loadTab('faqs')" id="nav-faqs">FAQs</li>
                <li onclick="loadTab('projects')" id="nav-projects">Projects</li>
                <li onclick="loadTab('connect')" id="nav-connect">Connect</li>
                <li onclick="loadTab('dev')" id="nav-dev">Dev</li>
            </ul>
        </nav>
    </header>

    <main id="content-area"></main>

    <script>
        const contentArea = document.getElementById('content-area');

        // New Dev Renderer
        function renderDev(data) {
            contentArea.innerHTML = `<div class="dev-container">` + data.map(item => {
                const formatted = item.code.replace(/</g, "&lt;").replace(/>/g, "&gt;")
                                           .replace(/&lt;501&gt;(.*?)&lt;\/501&gt;/g, '<span class="tag-501">$1</span>');
                return `
                <div class="code-snippet-card">
                    <div class="dev-header">
                        <img src="${item.img || 'https://placehold.co/50'}" alt="icon">
                        <h3>${item.title}</h3>
                    </div>
                    <pre><code>${formatted}</code></pre>
                    <div class="copy-footer">
                        <button class="big-copy-btn" onclick="copyCode(this, \`${item.code}\`)">Copy Source Code</button>
                    </div>
                </div>`;
            }).join('') + `</div>`;
        }

        // Updated copy code logic for the big button
        function copyCode(btn, rawCode) {
            const cleanCode = rawCode.replace(/<501>/g, '').replace(/<\/501>/g, '');
            navigator.clipboard.writeText(cleanCode).then(() => {
                const originalText = btn.innerText;
                btn.innerText = "COPIED TO CLIPBOARD!";
                btn.style.background = "#00ff88";
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = "";
                }, 2000);
            });
        }

        // (Keep your existing loadTab, renderConnect, renderFAQs functions here...)
        
        loadTab('faqs'); // Initial load
    </script>
</body>
</html>
